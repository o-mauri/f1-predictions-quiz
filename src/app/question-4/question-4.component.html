<app-question-title [number]="4" [title]="'Fan Favourite'" [question]="'Which driver will recieve the most driver of the day awards?'" [description]="'3 points per driver of the day award'" />

<div class="answer-grid">
  <table>
    @for (answer of answers; track answer.player.name) {
    <tr>
      <td class="player-icon-cell"><app-player-icon [player]="answer.player" size="large" variant="image" /></td>
      <td class="driver-photo-cell"><app-driver-photo [driver]="answer.driver" size="med" variant="circular" /></td>
      <td class="driver-name-cell">{{ answer.driver.longName }}</td>
      <td class="provisional-points-cell">{{ answer.provisionalPoints }}</td>
      <td [class]="'confirmed-points-cell ' + (answer.confirmedPoints === '' ? 'confirmed-points-negative' : '')">{{ answer.confirmedPoints === "+0" ? answer.confirmedNegativePoints : answer.confirmedPoints }}</td>
    </tr>
  }
  </table>  
</div>
