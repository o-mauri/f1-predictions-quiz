<app-question-title
  [number]="13"
  [title]="'That wasnt supposed to happen...'"
  [question]="'Which sprint race will have the most pit stops?'"
  [description]="'5pts per pit stop, +10 points for the race with the most pit stops'"
/>

<div class="answer-grid">
  <table>
    @for (answer of answers; track answer.player.name) {
      <tr>
        <td class="player-icon-cell">
          <app-player-icon [player]="answer.player" size="med" variant="image" />
        </td>
        <td class="race-cell">
          <app-race-icon [race]="answer.race" [showLabel]="true" size="med" variant="standard" />
        </td>
        <td class="pit-count-cell">
          @for (i of getPitCountRange(answer.pitCount); track i) {
            <span class="pit-count-emoji">🛑</span>
          }
        </td>
        <td class="provisional-points-cell">{{ answer.provisionalPoints }}</td>
        <td
          [class]="
            'confirmed-points-cell ' +
            (answer.confirmedPoints === '' ? 'confirmed-points-negative' : '')
          "
        >
          {{ answer.confirmedPoints }}
        </td>
      </tr>
    }
  </table>
</div>
