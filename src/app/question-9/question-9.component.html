<app-question-title
  [number]="9"
  [title]="'Papaya Rules Please'"
  [question]="'Which team will have the least DNFs over the season?'"
  [description]="'-5pts per DNF, -15pts per double DNF'"
/>

<div class="answer-grid">
  <table>
    @for (answer of answers; track answer.player.name) {
      <tr>
        <td class="player-icon-cell">
          <app-player-icon [player]="answer.player" size="large" variant="image" />
        </td>
        <td class="team-icon-cell">
          <app-team-icon [showName]="true" [team]="answer.team" size="large" variant="square" />
        </td>
        <td class="dnfs-cell">
          @for (race of allRaces; track race.name) {
            @if (answer.dnfs.includes(race)) {
              <app-race-icon [race]="race" [showLabel]="false" size="sm" variant="circular" [surfaceText]="'1'" />
            }
            @else if (answer.doubleDnfs.includes(race)) {
              <app-race-icon [race]="race" [showLabel]="false" size="sm" variant="circular" [surfaceText]="'2'  " />
            }
          }
        </td>
        <td class="confirmed-points-cell confirmed-points-negative">
          {{ answer.confirmedNegativePoints }}
        </td>
      </tr>
    }
  </table>
</div>
